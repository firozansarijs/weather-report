<!DOCTYPE html>
<html lang="en">
<head>

    <title>Weather Report</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="search-container">
            <input type="text" placeholder="Search your city">
        </section>
        <section class="weather-card">

            <p>TEMPERATURE</p>

            <p>WIND</p>
        </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
